name: Build and Deploy to AKS

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACR_NAME: acrraj
  IMAGE_NAME: springboot-app
  RESOURCE_GROUP: springboot-aks-rg
  CLUSTER_NAME: springboot-aks-cluster

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    #  Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    #  Setup Java (needed for Maven)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    #  Build Spring Boot JAR
    - name: Build Spring Boot JAR
      run: mvn clean package -DskipTests
      working-directory: azure-aks-practice-cicd

    #  Login to Azure
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    #  Login to ACR
    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    #  Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .
      working-directory: azure-aks-practice-cicd

    #  Push Image to ACR
    - name: Push Image to ACR
      run: |
        docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

    #  Get AKS credentials
    - name: Get AKS credentials
      run: |
        az aks get-credentials \
          --resource-group $RESOURCE_GROUP \
          --name $CLUSTER_NAME

    #  Deploy to AKS
    - name: Deploy to AKS
      run: |
        kubectl set image deployment/springboot-deployment \
        springboot=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

        kubectl rollout status deployment/springboot-deployment
